<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Spell Generator</title>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>Welcome to the Magical Spell Generator!</h1>
    </div>

    <!-- Spell Area -->
    <div id="spellArea"></div>
    

    <div class="container">
        <!-- Generate Button -->
        <button id="generateButton">Generate Spell</button>

        <!-- Ingredient List -->
        <ul id="ingredientList">
            <li>Dragon Scale</li>
            <li>Phoenix Feather</li>
            <li>Unicorn Horn</li>
        </ul>

        <!-- Reset Button -->
        <button id="resetButton">Reset</button>
    </div>

    <script>
        const spellArea = document.getElementById("spellArea");
        const generateButton = document.getElementById("generateButton");
        const ingredientList = document.querySelectorAll("#ingredientList li");
        const resetButton = document.getElementById("resetButton");

        generateButton.addEventListener("click", function () {

            const randomIndex = Math.floor(Math.random() * ingredientList.length);
            const selectedIngredient = ingredientList[randomIndex].textContent;

            let countdown = 3;

            const timer = setInterval(function () {

                if (countdown > 0) {
                    spellArea.textContent = countdown;
                    countdown--;
                } else {
                    clearInterval(timer);

                    spellArea.textContent = `${selectedIngredient}`;

                    const randomColor = `rgb(
                ${Math.floor(Math.random() * 256)},
                ${Math.floor(Math.random() * 256)},
                ${Math.floor(Math.random() * 256)}
              )`;

                    spellArea.style.backgroundColor = randomColor;
                }

            }, 1000);

        });

        resetButton.addEventListener("click", function () {
            spellArea.textContent = "";
            spellArea.style.backgroundColor = "";
        });
    </script>
</body>
</html>
